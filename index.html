<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section role="region" class="container" data-testid="test-todo-card">
      <div class="mini-container">
        <div class="todo-header">
          <h2 id="todo-title" data-testid="test-todo-title">
            Midnight Idea Capture
          </h2>
          <div class="todo-priority-container">
            <span class="todo-priority high" data-testid="test-todo-priority"
              >High Priority</span
            >
            <span
              class="priority-indicator high"
              data-testid="test-todo-priority-indicator"
            ></span>
          </div>
        </div>
        <div class="description-container collapsible">
          <p class="description" data-testid="test-todo-description">
            Set aside time to write down every random idea that crosses your
            mind—no filtering, no judging. It could be app ideas, story plots,
            business concepts, or wild inventions.
          </p>
        </div>
        <div
          class="expand-collapse-container"
          data-testid="test-todo-collapsible-section"
        >
          <button
            class="expand-collapse-toggle-button expand-btn"
            aria-expanded="false"
            data-testid="test-todo-expand-toggle"
          >
            Expand
          </button>
        </div>
        <div class="dates">
          <time id="due-date" data-testid="test-todo-due-date"
            >Due Apr 30, 2026</time
          >
          <time
            class="overdue-timer visible"
            data-testid="test-todo-overdue-indicator"
            aria-live="polite"
          ></time>
          <time
            id="timer"
            aria-live="polite"
            data-testid="test-todo-time-remaining"
          ></time>
        </div>
        <div class="pills">
          <ul role="list" class="tags" data-testid="test-todo-tags">
            <li data-testid="test-todo-tag-work">Work</li>
            <li data-testid="test-todo-tag-urgent">Urgent</li>
          </ul>
          <div>
            <span class="todo-status pending" data-testid="test-todo-status"
              >Pending</span
            >
            <select id="status-control" data-testid="test-todo-status-control">
              <option value="Pending" selected>Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>
        <button
          class="btn edit-btn"
          aria-labelledby="Edit Todo"
          data-testid="test-todo-edit-button"
        >
          Edit
        </button>
        <button
          class="btn delete-btn"
          aria-labelledby="Delete Todo"
          data-testid="test-todo-delete-button"
        >
          Delete
        </button>
        <div class="bottom">
          <input
            type="checkbox"
            id="toggleCheckbox"
            data-testid="test-todo-complete-toggle"
          />
          <label class="complete-text" for="toggleCheckbox"
            >Mark as complete</label
          >
        </div>
      </div>
      <!-- Edit Mode -->
      <form id="edit-form" class="hidden" data-testid="test-todo-edit-form">
        <div class="title-container edit-container">
          <label for="edit-title">Title</label>
          <input
            type="text"
            id="edit-title"
            class="form-input"
            data-testid="test-todo-edit-title-input"
          />
        </div>
        <div class="description-container edit-container">
          <label for="edit-description">Description</label>
          <textarea
            name=""
            id="edit-description"
            class="form-input"
            data-testid="test-todo-edit-description-input"
          ></textarea>
        </div>
        <div class="priority-container edit-container">
          <label for="edit-priority">Priority-type</label>
          <select
            id="edit-priority"
            data-testid="test-todo-edit-priority-select"
          >
            <option value="Low Priority">Low Priority</option>
            <option value="Medium Priority">Medium Priority</option>
            <option value="High Priority">High Priority</option>
          </select>
        </div>
        <div class="due-date-container edit-container">
          <label for="edit-due-date">Due date</label>
          <input
            type="datetime-local"
            id="edit-due-date"
            class="form-input"
            data-testid="test-todo-edit-due-date-input"
          />
        </div>
        <div class="button-container">
          <button
            class="btn save-btn"
            type="submit"
            data-testid="test-todo-save-button"
          >
            Save
          </button>
          <button
            class="btn cancel-btn"
            type="button"
            data-testid="test-todo-cancel-button"
          >
            Cancel
          </button>
        </div>
        <p class="error hidden">The information has to be complete.</p>
      </form>
    </section>
    <script src="script.js"></script>
  </body>
</html>
