<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section role="region" class="container" data-testid="test-todo-card">
      <div class="todo-header">
        <h2 id="todo-title" data-testid="test-todo-title">
          Midnight Idea Capture
        </h2>
        <span class="todo-priority" data-testid="test-todo-priority"
          >High Priority</span
        >
      </div>
      <p class="description" data-testid="test-todo-description">
        Set aside time to write down every random idea that crosses your mind—no
        filtering, no judging. It could be app ideas, story plots, business
        concepts, or wild inventions.
      </p>
      <div class="dates">
        <time id="due-date" data-testid="test-todo-due-date"
          >Due Apr 30, 2026</time
        >
        <time
          id="timer"
          aria-live="polite"
          data-testid="test-todo-time-remaining"
        ></time>
      </div>
      <div class="pills">
        <ul role="list" class="tags" data-testid="test-todo-tags">
          <li data-testid="test-todo-tag-work">Work</li>
          <li data-testid="test-todo-tag-urgent">Urgent</li>
        </ul>
        <span class="todo-status" data-testid="test-todo-status"
          >In Progress</span
        >
      </div>
      <button
        class="btn edit-btn"
        aria-labelledby="Edit Todo"
        data-testid="test-todo-edit-button"
      >
        Edit
      </button>
      <button
        class="btn delete-btn"
        aria-labelledby="Delete Todo"
        data-testid="test-todo-delete-button"
      >
        Delete
      </button>
      <div class="bottom">
        <input
          type="checkbox"
          id="toggleCheckbox"
          data-testid="test-todo-complete-toggle"
        />
        <label class="complete-text" for="toggleCheckbox"
          >Mark as complete</label
        >
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
